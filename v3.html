<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KARMA</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ═══════ DESIGN TOKENS ═══════ */
:root{
  --bg:#09090b;--s1:#0e0e11;--s2:#131316;--s3:#19191e;--s4:#1f1f26;--s5:#27272f;--s6:#2f2f39;
  --bd:rgba(255,255,255,.05);--bd2:rgba(255,255,255,.09);--bd3:rgba(255,255,255,.15);
  --text:#dcdae6;--t2:#7c7a8a;--t3:#4a4858;--t4:#2c2b36;
  --str:#e2685a;--strbg:rgba(226,104,90,.07);--con:#34b898;--conbg:rgba(52,184,152,.07);
  --int:#6e61d6;--intbg:rgba(110,97,214,.07);--per:#d6a643;--perbg:rgba(214,166,67,.07);
  --gold:#d6a643;--goldbg:rgba(214,166,67,.05);
  --ease:cubic-bezier(.16,1,.3,1);--sb:240px;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',system-ui,sans-serif;
  --mono:'SF Mono',SFMono-Regular,ui-monospace,'Cascadia Mono','Segoe UI Mono',Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.55;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s5);border-radius:2px}
button,input,select,textarea{font-family:var(--font);letter-spacing:inherit}

/* ═══════ SCREENS ═══════ */
.screen{display:none;height:100vh;overflow:hidden}.screen.active{display:flex}

/* ═══════ AUTH ═══════ */
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.auth-bg{position:absolute;inset:0;background:radial-gradient(ellipse 40% 50% at 30% 40%,rgba(110,97,214,.04),transparent 70%),radial-gradient(ellipse 30% 40% at 70% 60%,rgba(214,166,67,.03),transparent 70%)}
.auth-card{position:relative;z-index:2;width:380px;max-width:92vw;animation:fadeUp .4s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-k{display:inline-flex;width:44px;height:44px;align-items:center;justify-content:center;border-radius:12px;background:var(--s3);border:1px solid var(--bd2);font-size:18px;font-weight:700;color:var(--gold);letter-spacing:.02em;margin-bottom:10px}
.auth-brand{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--t2)}
.glass{background:var(--s1);border:1px solid var(--bd2);border-radius:14px;padding:24px}
.f-group{margin-bottom:14px}.f-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;display:block}
.f-input{width:100%;padding:9px 12px;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:.15s}.f-input:focus{border-color:var(--gold)}
.f-input::placeholder{color:var(--t4)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chip-grid{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 13px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--bd2);background:transparent;color:var(--t2);cursor:pointer;transition:.12s;user-select:none}
.chip:hover{border-color:var(--bd3);color:var(--text)}.chip.sel{border-color:var(--gold);color:var(--gold);background:var(--goldbg)}
.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.goal-card{padding:12px;border-radius:10px;text-align:center;border:1px solid var(--bd2);background:transparent;cursor:pointer;transition:.12s;position:relative;overflow:hidden}
.goal-card:hover{border-color:var(--bd3)}.goal-card.sel{border-color:var(--gold)}
.goal-card.sel::after{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--gold)}
.gc-ico{font-size:22px;margin-bottom:4px}.gc-name{font-size:12px;font-weight:600;margin-bottom:1px}.gc-desc{font-size:9px;color:var(--t3)}
.btn-p{width:100%;padding:10px;border:none;border-radius:8px;background:var(--gold);color:var(--bg);font-size:13px;font-weight:600;cursor:pointer;transition:.12s}.btn-p:hover{opacity:.9}.btn-p:disabled{opacity:.3;cursor:not-allowed}
.btn-g{padding:9px 18px;border:1px solid var(--bd2);border-radius:8px;background:transparent;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;transition:.12s}.btn-g:hover{border-color:var(--bd3);color:var(--text)}
.steps-bar{display:flex;gap:3px;margin-bottom:20px}.step-d{flex:1;height:2px;border-radius:1px;background:var(--s4);transition:.3s}.step-d.done,.step-d.cur{background:var(--gold)}
.target-sug{background:var(--s3);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;margin:6px 0;display:flex;align-items:center;gap:8px}
.ts-v{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--gold)}.ts-use{padding:4px 10px;border-radius:6px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:10px;font-weight:600;cursor:pointer;transition:.1s}.ts-use:hover{background:var(--goldbg)}

/* ═══════ ANALYSIS ═══════ */
.analysis-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;flex:1}
.a-orb{width:80px;height:80px;border-radius:50%;position:relative;margin-bottom:24px}
.a-ring{position:absolute;inset:0;border-radius:50%;border:1px solid var(--gold);opacity:.25;animation:ap 2s ease-in-out infinite}
.a-ring:nth-child(2){inset:-8px;animation-delay:.3s;border-color:var(--int);opacity:.15}
@keyframes ap{0%,100%{transform:scale(1);opacity:.25}50%{transform:scale(1.06);opacity:.1}}
.a-core{position:absolute;inset:16px;border-radius:50%;background:radial-gradient(circle,rgba(214,166,67,.15),transparent);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--gold)}
.a-title{font-size:16px;font-weight:600;margin-bottom:4px}.a-step-text{font-size:11px;color:var(--t2);margin-bottom:18px}
.a-steps{text-align:left;max-width:280px}.a-st{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:11px;color:var(--t3);transition:.3s}
.a-st.active{color:var(--text)}.a-st.done{color:var(--con)}
.a-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:8px;transition:.3s}
.a-st.active .a-dot{border-color:var(--gold);background:var(--goldbg)}.a-st.done .a-dot{border-color:var(--con);background:var(--conbg);color:var(--con)}

/* ═══════ APP LAYOUT ═══════ */
.app-l{display:flex;height:100vh;width:100%;overflow:hidden}
.sidebar{width:var(--sb);flex-shrink:0;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;transform:translateX(calc(var(--sb)*-1));transition:transform .25s var(--ease);z-index:10}.sidebar.open{transform:translateX(0)}
.sb-top{flex-shrink:0;padding:12px;border-bottom:1px solid var(--bd)}
.sb-logo-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer;padding:4px}
.sb-k{width:24px;height:24px;border-radius:6px;background:var(--s3);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.sb-brand{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--t2)}
.sb-profile-mini{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px;cursor:pointer;transition:.12s}
.sb-profile-mini:hover{border-color:var(--bd2)}
.sb-av{width:32px;height:32px;border-radius:50%;background:var(--s3);border:1px solid var(--bd2);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-name{font-size:12px;font-weight:600;margin-bottom:0}.sb-sub{font-size:9px;color:var(--t3)}
.sb-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--s5) transparent;padding:6px 0}
.sb-sec{padding:8px 12px 3px;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t4)}
.nav-i{display:flex;align-items:center;gap:7px;padding:7px 10px;margin:1px 5px;border-radius:6px;color:var(--t2);font-size:11px;font-weight:500;cursor:pointer;transition:.1s;position:relative;user-select:none}
.nav-i:hover{background:var(--s3);color:var(--text)}.nav-i.active{background:var(--s3);color:var(--text)}
.nav-i.active::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:2px;border-radius:1px;background:var(--gold)}
.nav-ico{font-size:13px;width:16px;text-align:center}
.nav-badge{margin-left:auto;font-size:8px;font-weight:600;background:var(--s4);color:var(--t3);border:1px solid var(--bd);padding:1px 6px;border-radius:8px;font-family:var(--mono)}
.sb-stats{padding:8px 12px;border-top:1px solid var(--bd)}
.sb-stat-r{margin-bottom:6px}.sb-sr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.sb-sr-l{display:flex;align-items:center;gap:5px}
.sb-sr-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}.sb-sr-name{font-size:10px;font-weight:500}
.sb-sr-v{font-size:10px;font-weight:600;font-family:var(--mono)}
.sb-sr-track{height:2px;background:var(--s4);border-radius:1px;overflow:hidden}.sb-sr-fill{height:100%;border-radius:1px;transition:width .4s var(--ease)}
.sb-foot{padding:8px;border-top:1px solid var(--bd);margin-top:auto;flex-shrink:0;display:flex;gap:4px}
.sb-foot-btn{flex:1;padding:6px;background:transparent;border:1px solid var(--bd);color:var(--t3);font-size:10px;cursor:pointer;transition:.1s;display:flex;align-items:center;justify-content:center;gap:4px;border-radius:5px}.sb-foot-btn:hover{background:var(--s3);color:var(--text);border-color:var(--bd2)}

/* Main area */
.main-a{flex:1;height:100vh;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--s5) transparent}
.page{display:none;padding:24px 28px 60px;min-height:100%;animation:pgIn .15s ease}.page.active{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.pg-t{font-size:20px;font-weight:600;letter-spacing:-.02em;margin-bottom:1px}
.pg-s{font-size:11px;color:var(--t2);margin-bottom:16px}

/* ═══════ UNIVERSAL CARD + GLOW ═══════ */
.card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;position:relative;overflow:hidden;transition:border-color .12s,transform .12s var(--ease),box-shadow .12s}
.card:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.3)}
.card .glow{position:absolute;width:160px;height:160px;border-radius:50%;pointer-events:none;background:radial-gradient(circle,var(--gc,rgba(214,166,67,.06)),transparent 70%);opacity:0;transition:opacity .2s;transform:translate(-50%,-50%);z-index:0}
.card:hover .glow{opacity:1}
.card>*:not(.glow){position:relative;z-index:1}

/* ═══════ DASHBOARD ═══════ */
.dash-ambient{position:fixed;top:0;left:0;right:0;height:300px;pointer-events:none;z-index:0;background:radial-gradient(ellipse 35% 45% at 25% 0%,rgba(110,97,214,.03),transparent 70%),radial-gradient(ellipse 30% 35% at 75% 0%,rgba(214,166,67,.02),transparent 70%)}
.dash-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 0 20px;position:relative;z-index:1}
.dh-l{display:flex;align-items:center;gap:10px}.dh-r{display:flex;align-items:center;gap:8px}
.dh-logo{width:32px;height:32px;border-radius:8px;background:var(--s3);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gold);cursor:pointer;transition:.2s var(--ease)}.dh-logo:hover{transform:scale(1.05)}
.dh-brand{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--t2)}
.dh-date{font-size:10px;color:var(--t3)}
.dh-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);transition:.12s;font-size:13px}.dh-btn:hover{border-color:var(--bd2);color:var(--text)}
/* Profile hero */
.p-hero{display:grid;grid-template-columns:240px 1fr;gap:16px;margin-bottom:20px;position:relative;z-index:1}
.av-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.av-visual{height:200px;position:relative;overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center}
.av-body{width:120px;height:180px;position:relative;perspective:600px}
.av-body-inner{width:100%;height:100%;transform-style:preserve-3d;animation:bodyRotate 10s linear infinite;position:relative}
@keyframes bodyRotate{0%{transform:rotateY(0deg)}100%{transform:rotateY(360deg)}}
.av-body:hover .av-body-inner{animation-play-state:paused}
.av-info{padding:12px;border-top:1px solid var(--bd)}
.av-n{font-size:15px;font-weight:600;margin-bottom:1px}.av-cls{font-size:9px;font-weight:500;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.av-bar{margin-bottom:6px}.av-bar:last-child{margin-bottom:0}
.avb-t{display:flex;justify-content:space-between;margin-bottom:2px}
.avb-l{font-size:8px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t4)}.avb-v{font-size:9px;font-weight:600;font-family:var(--mono)}
.avb-trk{height:3px;background:var(--s4);border-radius:1.5px;overflow:hidden}.avb-f{height:100%;border-radius:1.5px;transition:width .5s var(--ease)}
.avb-f.hp{background:var(--str)}.avb-f.xp{background:var(--gold)}
/* Creds display */
.creds-box{background:var(--s3);border:1px solid var(--bd);border-radius:6px;padding:8px 10px;margin-top:8px;font-size:10px;color:var(--t3)}
.creds-box span{color:var(--t2);font-family:var(--mono)}
/* Hero right */
.hero-r{display:flex;flex-direction:column;gap:12px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-tile{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px;position:relative;overflow:hidden;cursor:pointer;transition:.15s var(--ease)}
.stat-tile:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.3);border-color:var(--bd2)}
.stat-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--sc);opacity:.5}
.stat-tile::after{content:'';position:absolute;top:-25px;left:50%;width:60px;height:60px;background:radial-gradient(circle,var(--sg,rgba(255,255,255,.03)),transparent 70%);transform:translateX(-50%);pointer-events:none;opacity:0;transition:opacity .2s}.stat-tile:hover::after{opacity:1}
.stat-tile[data-s="str"]{--sc:var(--str);--sg:rgba(226,104,90,.12)}.stat-tile[data-s="con"]{--sc:var(--con);--sg:rgba(52,184,152,.12)}.stat-tile[data-s="int"]{--sc:var(--int);--sg:rgba(110,97,214,.12)}.stat-tile[data-s="per"]{--sc:var(--per);--sg:rgba(214,166,67,.12)}
.st-a{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;color:var(--sc);margin-bottom:2px}
.st-v{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--sc);line-height:1;margin-bottom:1px}
.st-n{font-size:10px;color:var(--t2);margin-bottom:6px}
.st-bar{height:2px;background:var(--s4);border-radius:1px;overflow:hidden}.st-fill{height:100%;border-radius:1px;background:var(--sc);transition:width .4s var(--ease)}
.st-lv{font-size:8px;color:var(--t3);margin-top:3px;font-family:var(--mono)}
/* Quote */
.quote-c{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;position:relative;flex:1;display:flex;flex-direction:column;justify-content:center}
.quote-c::before{content:'';position:absolute;top:0;left:0;bottom:0;width:1.5px;background:linear-gradient(180deg,var(--gold),transparent)}
.q-mark{font-size:24px;color:var(--gold);opacity:.15;line-height:1;margin-bottom:2px}.q-text{font-size:12px;line-height:1.7;font-style:italic}.q-auth{font-size:10px;color:var(--t3);margin-top:4px;font-style:normal}
/* Horoscope */
.horo-c{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.horo-sign{font-size:22px}.horo-info{flex:1}.horo-n{font-size:11px;font-weight:600;margin-bottom:1px}.horo-t{font-size:9px;color:var(--t2);line-height:1.5}
.horo-luck{font-size:8px;color:var(--gold);font-weight:600;background:var(--goldbg);border:1px solid rgba(214,166,67,.12);padding:2px 8px;border-radius:8px;white-space:nowrap}
/* Quick metrics */
.qm-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;position:relative;z-index:1}
.qm{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px;transition:.12s var(--ease);cursor:default}
.qm:hover{border-color:var(--bd2);transform:translateY(-1px)}
.qm-l{font-size:8px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t4);margin-bottom:4px}
.qm-v{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1;margin-bottom:2px}
.qm-s{font-size:9px;color:var(--t3)}
/* Nav cards */
.nav-sec{position:relative;z-index:1;margin-top:18px}
.nav-sec-t{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t4);margin-bottom:10px;display:flex;align-items:center;gap:8px}.nav-sec-t::after{content:'';flex:1;height:1px;background:var(--bd)}
.nav-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.nav-card{padding:14px;cursor:pointer}.nav-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--nc);opacity:0;transition:.15s}.nav-card:hover::before{opacity:.5}
.nc-ico{font-size:18px;margin-bottom:6px}.nc-n{font-size:12px;font-weight:600;margin-bottom:2px}.nc-d{font-size:9px;color:var(--t3);line-height:1.4}
.nc-badge{position:absolute;top:10px;right:10px;font-family:var(--mono);font-size:8px;font-weight:600;background:var(--s4);border:1px solid var(--bd);padding:1px 6px;border-radius:6px;color:var(--t3)}

/* ═══════ HABITS ═══════ */
.hab-bar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.hab-tab{padding:4px 11px;border-radius:16px;font-size:10px;font-weight:600;border:1px solid var(--bd2);background:transparent;color:var(--t2);cursor:pointer;transition:.1s}
.hab-tab:hover{color:var(--text)}.hab-tab.act{border-color:transparent;color:#fff;font-weight:700}
.hab-tab.act[data-c="all"]{background:var(--s5)}.hab-tab.act[data-c="physical"]{background:var(--str)}.hab-tab.act[data-c="mental"]{background:var(--int)}.hab-tab.act[data-c="nutrition"]{background:var(--con)}.hab-tab.act[data-c="grooming"]{background:var(--per);color:#000}.hab-tab.act[data-c="recovery"]{background:#7b5ea7}
.hab-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.htile{padding:12px;cursor:default}.htile::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--hc);opacity:.35;z-index:1}
.htile[data-cat="physical"]{--hc:var(--str);--gc:rgba(226,104,90,.06)}.htile[data-cat="mental"]{--hc:var(--int);--gc:rgba(110,97,214,.06)}.htile[data-cat="nutrition"]{--hc:var(--con);--gc:rgba(52,184,152,.06)}.htile[data-cat="grooming"]{--hc:var(--per);--gc:rgba(214,166,67,.06)}.htile[data-cat="recovery"]{--hc:#7b5ea7;--gc:rgba(123,94,167,.06)}
.htile.neg{--hc:var(--str);--gc:rgba(226,104,90,.06)}
.ht-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.ht-ico{font-size:15px}.ht-tag{font-size:8px;font-weight:700;letter-spacing:.05em;padding:1px 5px;border-radius:6px;text-transform:uppercase;color:var(--hc);background:color-mix(in srgb,var(--hc) 8%,transparent)}
.ht-n{font-size:11px;font-weight:600;line-height:1.3;margin-bottom:1px}.ht-meta{font-size:8px;color:var(--t3)}

const statXpNeed=lv=>30+lv*20;
const maxHP=()=>50+S.player.stats.con*2;
const xpMult=()=>1+(S.player.stats.int/40);
const goldMult=()=>1+(S.player.stats.per/100);
const getTitle=lv=>lv<5?'Initiate':lv<10?'Apprentice':lv<20?'Warrior':lv<35?'Champion':lv<50?'Veteran':lv<70?'Master':lv<90?'Legend':'Apex';

function addXP(base,stat,el){
  const e=Math.round(base*xpMult()),gp=parseFloat((Math.random()*.25+.1*goldMult()).toFixed(2));
  S.player.xp+=e;S.player.gold=parseFloat((S.player.gold+gp).toFixed(2));
  if(stat&&S.player.statXP[stat]!==undefined){S.player.statXP[stat]+=e;while(S.player.statXP[stat]>=statXpNeed(S.player.statLevels[stat])){S.player.statXP[stat]-=statXpNeed(S.player.statLevels[stat]);S.player.statLevels[stat]++;S.player.stats[stat]++;showToast(`${SN[stat]} → ${S.player.stats[stat]}!`)}}
  if(el)spawnP(e,gp,el);
  while(S.player.xp>=xpNeed(S.player.level)){S.player.xp-=xpNeed(S.player.level);S.player.level++;S.player.hp=Math.min(maxHP(),S.player.hp+Math.floor(maxHP()*.3));showToast(`Level Up! → ${S.player.level}`)}
  save();updateSB();
}
function removeXP(base,stat){const e=Math.round(base*xpMult());S.player.xp-=e;if(stat)S.player.statXP[stat]=Math.max(0,(S.player.statXP[stat]||0)-e);while(S.player.xp<0){if(S.player.level<=1){S.player.xp=0;break}S.player.level--;S.player.xp+=xpNeed(S.player.level)}save();updateSB()}
function damage(pts){S.player.hp=Math.max(0,S.player.hp-Math.round(pts*(1-S.player.stats.con/300)));save()}

function getExpInsights(items,total,catT){
  const ins=[];
  const topCat=Object.entries(catT).sort((a,b)=>b[1]-a[1])[0];
  if(topCat&&topCat[1]>total*.4)ins.push({icon:'⚠️',text:`${topCat[0]} is ${Math.round(topCat[1]/total*100)}% of spending — consider reducing`});
  const daysInMonth=new Date(expY,expM+1,0).getDate();const daily=total/Math.max(daysInMonth,1);
  if(S.budget.monthly>0){const pct=Math.round(total/S.budget.monthly*100);if(pct>90)ins.push({icon:'🔴',text:`${pct}% of budget used — only ₹${Math.max(0,S.budget.monthly-total).toLocaleString('en-IN')} left`});else if(pct>60)ins.push({icon:'🟡',text:`${pct}% of ₹${S.budget.monthly.toLocaleString('en-IN')} budget used`});else ins.push({icon:'🟢',text:`On track — ${pct}% of budget used`})}
  if(daily>1500)ins.push({icon:'📊',text:`Averaging ₹${Math.round(daily).toLocaleString('en-IN')}/day — ${daily>2000?'high':'moderate'} burn rate`});
  const weekItems=items.filter(e=>{const d=new Date(e.date);const now=new Date();return(now-d)/(864e5)<7});
  if(weekItems.length>0){const weekTotal=weekItems.reduce((a,e)=>a+e.amount,0);ins.push({icon:'📅',text:`₹${weekTotal.toLocaleString('en-IN')} spent this week (${weekItems.length} transactions)`})}
  return ins;
}

  <div class="exp-list">${items.length?items.map(e=>{const idx=S.expenses.indexOf(e);return`<div class="exp-i"><div class="exp-dot" style="background:${CAT_COLORS[e.category]||'#7c7a8a'}"></div><div class="exp-info"><div class="exp-nm">${e.description||e.category}</div><div class="exp-dt">${e.date} · ${e.category}</div></div><div class="exp-amt">₹${e.amount.toLocaleString('en-IN')}</div><button class="exp-del" onclick="delExp(${idx})">✕</button></div>`}).join(''):'<div style="text-align:center;padding:20px;color:var(--t3);font-size:11px">No expenses</div>'}</div>
  </div><div>
  <!-- Budget -->
  <div class="budget-card"><div style="font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t4);margin-bottom:6px">Monthly Budget</div>
  <div class="budget-set"><span style="font-size:11px;color:var(--t2)">₹</span><input class="budget-inp" id="budget-inp" type="number" value="${S.budget.monthly||''}" placeholder="30000"><button class="btn-g" style="padding:5px 10px;font-size:9px" onclick="setBudget()">Set</button></div>
  ${S.budget.monthly?`<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-bottom:4px"><span>₹${total.toLocaleString('en-IN')} spent</span><span>₹${Math.max(0,S.budget.monthly-total).toLocaleString('en-IN')} left</span></div><div class="budget-bar"><div class="budget-fill" style="width:${budgetPct}%;background:${budgetPct>90?'var(--str)':budgetPct>60?'var(--per)':'var(--con)'}"></div></div>`:''}</div>
  <!-- Categories with expand -->
  <div class="exp-cp"><div class="exp-ct">Categories</div>
  ${S.expenseCats.map(c=>{const v=catT[c]||0;const isExp=expandedCat===c;const catItems=items.filter(e=>e.category===c);
    return`<div><div class="ecr exp-cat-expand ${isExp?'expanded':''}" onclick="toggleExpCat('${c}')" style="cursor:pointer"><div class="ecr-d" style="background:${CAT_COLORS[c]||'#7c7a8a'}"></div><div class="ecr-n">${c}</div><div class="ecr-bw"><div class="ecr-b"><div class="ecr-f" style="width:${maxCat?Math.round(v/maxCat*100):0}%;background:${CAT_COLORS[c]||'#7c7a8a'}"></div></div></div><div class="ecr-v" style="color:${CAT_COLORS[c]||'#7c7a8a'}">₹${v.toLocaleString('en-IN')}</div></div>
    ${isExp&&catItems.length?`<div style="padding:4px 0 8px 14px">${catItems.slice(0,5).map(e=>`<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:9px;color:var(--t3)"><span>${e.description||c}</span><span style="font-family:var(--mono)">₹${e.amount}</span></div>`).join('')}${catItems.length>5?`<div style="font-size:8px;color:var(--t4);padding-top:2px">+${catItems.length-5} more</div>`:''}</div>`:''}</div>`}).join('')}
  <div class="add-cat-row"><input class="add-cat-inp" id="new-cat-inp" placeholder="New category..."><button class="add-cat-btn" onclick="addExpCat()">+</button></div>
  </div></div></div>`;
}
function addExp(){const amt=parseFloat(document.getElementById('exp-amt').value);if(!amt||amt<=0){showToast('Enter amount');return}S.expenses.push({amount:amt,description:document.getElementById('exp-desc').value.trim()||document.getElementById('exp-cat').value,category:document.getElementById('exp-cat').value,date:document.getElementById('exp-date').value||todayKey(),created:Date.now()});save();renderExpenses();showToast(`₹${amt} added`)}
function delExp(i){S.expenses.splice(i,1);save();renderExpenses()}
function shiftExpM(n){expM+=n;if(expM>11){expM=0;expY++}if(expM<0){expM=11;expY--}renderExpenses()}
function setBudget(){const v=parseFloat(document.getElementById('budget-inp').value);S.budget.monthly=v||0;save();renderExpenses();showToast(v?`Budget set: ₹${v.toLocaleString('en-IN')}`:'Budget cleared')}
function toggleExpCat(c){expandedCat=expandedCat===c?null:c;renderExpenses()}
function addExpCat(){const inp=document.getElementById('new-cat-inp');const v=inp.value.trim();if(!v)return;if(S.expenseCats.includes(v)){showToast('Exists');return}S.expenseCats.push(v);save();renderExpenses();showToast(`${v} added`)}

// ═══ STAT DETAIL PAGES ═══
function renderStatPage(stat){
  const pl=S.player,lv=pl.statLevels[stat],xp=pl.statXP[stat],need=statXpNeed(lv),pct=Math.round(xp/need*100);
  const col=`var(--${stat})`;
  const linkedHabits=S.habits.filter(h=>h.stat===stat&&!h.neg);
  const linkedDailies=getDailies().filter(d=>d.stat===stat);
  const desc={str:'Physical output, gym performance, movement',con:'HP cap, nutrition, recovery, endurance',int:'XP multiplier (+2.5%/pt), mental tasks',per:'Gold drops, streaks, grooming, appearance'}[stat];
  const sugHabits={str:[{n:'Pull-ups',ico:'💪'},{n:'Plank hold',ico:'🧘'},{n:'Swimming',ico:'🏊'}],con:[{n:'Cold shower',ico:'🧊'},{n:'Meal prep',ico:'🥘'},{n:'Probiotic',ico:'💊'}],int:[{n:'Read 20min',ico:'📚'},{n:'Chess puzzle',ico:'♟️'},{n:'New skill',ico:'🎯'}],per:[{n:'Grooming check',ico:'🪞'},{n:'Posture drill',ico:'🧍'},{n:'Outfit plan',ico:'👔'}]}[stat]||[];

  document.getElementById('page-stat-'+stat).innerHTML=`
  <div style="cursor:pointer;font-size:10px;color:var(--t3);margin-bottom:10px" onclick="goTo('dashboard')">← Back to Dashboard</div>
  <div class="stat-detail-header" style="border-left:3px solid ${col}">
    <div class="sdh-num" style="color:${col}">${pl.stats[stat]}</div>
    <div class="sdh-info"><div class="sdh-name" style="color:${col}">${SN[stat]}</div><div class="sdh-desc">${desc}</div>
    <div class="sdh-bar"><div class="sdh-fill" style="width:${pct}%;background:${col}"></div></div>
    <div style="font-size:9px;color:var(--t3);margin-top:3px;font-family:var(--mono)">Lv ${lv} · ${xp}/${need} XP to next</div></div>
  </div>
  <div class="sd-cols">
    <div class="sd-sec"><div class="sd-sec-t">Linked Habits (${linkedHabits.length})</div>${linkedHabits.map(h=>`<div class="sd-item"><div class="sd-item-ico">${h.icon}</div><div class="sd-item-info"><div class="sd-item-name">${h.name}</div><div class="sd-item-meta">${h.reps} reps · ${h.streak}d streak · +${h.base} XP</div></div></div>`).join('')}${linkedHabits.length===0?'<div style="font-size:10px;color:var(--t3);padding:8px">No linked habits yet</div>':''}</div>
    <div class="sd-sec"><div class="sd-sec-t">Daily Tasks (${linkedDailies.length})</div>${linkedDailies.map(d=>`<div class="sd-item"><div class="sd-item-ico">${d.emoji}</div><div class="sd-item-info"><div class="sd-item-name">${d.name}</div><div class="sd-item-meta">${d.time} · +${d.xp} XP</div></div></div>`).join('')}</div>
    <div class="sd-sec" style="grid-column:span 2"><div class="sd-sec-t">Suggested Habits to Add</div><div style="display:flex;gap:6px;flex-wrap:wrap">${sugHabits.map(h=>`<div class="card" style="padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:6px" onclick="addSugHabit('${h.n}','${stat}')" onmouseenter="initGlow(this)" onmouseleave="hideGlow(this)" onmousemove="moveGlow(event,this)"><div class="glow"></div><span>${h.ico}</span><span style="font-size:11px;font-weight:500">${h.n}</span><span style="font-size:9px;color:var(--t3);margin-left:4px">+ Add</span></div>`).join('')}</div></div>
  </div>`;
}
function addSugHabit(name,stat){S.habits.push({id:'s_'+Date.now(),name,cat:stat==='str'?'physical':stat==='con'?'nutrition':stat==='int'?'mental':'grooming',icon:'⭐',stat,base:8,reps:0,streak:0,neg:false});save();renderStatPage(stat);showToast(`${name} added!`)}

// ═══ UTILS ═══
function getLast(n){return Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(n-1)+i);return dateKey(d)})}
function exportData(){const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='karma-'+todayKey()+'.json';a.click();showToast('Exported')}
function resetProfile(){if(confirm('Reset all data?')){localStorage.removeItem('karmaV6');location.reload()}}

// ═══ INIT ═══
if(S.auth&&S.profile.onboarding_complete){showScreen('scr-app');goTo('dashboard')}
else if(S.auth&&!S.profile.onboarding_complete){showScreen('scr-onboard');renderOnboarding()}
else{showScreen('scr-auth');renderAuth()}
</script>
</body>
</html>
