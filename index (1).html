<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KARMA — Personal Growth OS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #07070f;
  --s1: #0e0e1c;
  --s2: #141424;
  --s3: #1a1a2e;
  --s4: #222238;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --gold: #f0b429;
  --gold2: #ffd060;
  --goldbg: rgba(240,180,41,0.12);
  --green: #00d97e;
  --greenbg: rgba(0,217,126,0.1);
  --blue: #4facfe;
  --bluebg: rgba(79,172,254,0.1);
  --red: #ff5f5f;
  --redbg: rgba(255,95,95,0.1);
  --purple: #a78bfa;
  --purplebg: rgba(167,139,250,0.1);
  --text: #f0f0f8;
  --text2: #8888aa;
  --text3: #44445a;
  --r: 14px;
  --r2: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overscroll-behavior: none; }

/* SCROLLABLE CONTENT */
.page { display: none; position: absolute; inset: 0; bottom: 72px; overflow-y: auto; overflow-x: hidden; padding: 20px 16px 24px; scrollbar-width: thin; scrollbar-color: var(--s4) transparent; }
.page.active { display: block; animation: fadeSlide .25s ease; }
@keyframes fadeSlide { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* NAV */
nav { position: fixed; bottom: 0; left: 0; right: 0; height: 72px; background: var(--s1); border-top: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: space-around; padding: 0 8px 8px; z-index: 100; }
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 16px; cursor: pointer; border: none; background: transparent; color: var(--text3); transition: color .2s; position: relative; }
.nav-btn.active { color: var(--gold); }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn span { font-size: 10px; font-weight: 500; letter-spacing: .03em; }

/* HEADINGS */
h1.pg-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.pg-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

/* CARDS */
.card { background: var(--s2); border: 0.5px solid var(--border); border-radius: var(--r2); padding: 18px; margin-bottom: 12px; }
.card-sm { background: var(--s2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 14px 16px; margin-bottom: 10px; }

/* SECTION LABEL */
.section-label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin: 20px 0 10px; }

/* BARS */
.bar-track { height: 6px; background: var(--s4); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width .5s cubic-bezier(.4,0,.2,1); }

/* PILLS/BADGES */
.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }

/* ===================== DASHBOARD ===================== */
.hero-card { background: linear-gradient(135deg, var(--s3) 0%, var(--s1) 100%); border: 0.5px solid var(--border2); border-radius: var(--r2); padding: 20px; margin-bottom: 12px; position: relative; overflow: hidden; }
.hero-card::before { content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(240,180,41,0.08) 0%, transparent 70%); pointer-events: none; }
.hero-top { display: flex; gap: 16px; align-items: flex-start; }
.avatar-wrap { position: relative; flex-shrink: 0; }
.avatar-ring { width: 80px; height: 80px; border-radius: 50%; background: conic-gradient(var(--gold) var(--prog, 0%), var(--s4) 0%); padding: 3px; position: relative; }
.avatar-inner { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; background: var(--s1); display: flex; align-items: center; justify-content: center; }
.avatar-level { position: absolute; bottom: -4px; right: -4px; background: var(--gold); color: #000; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 20px; font-family: 'Syne', sans-serif; border: 2px solid var(--bg); }
.hero-info { flex: 1; }
.hero-name { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; line-height: 1.1; }
.hero-title { font-size: 11px; color: var(--gold); font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin: 3px 0 10px; }
.bar-row { margin-bottom: 7px; }
.bar-label-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
.bar-label-row span:first-child { font-size: 11px; color: var(--text2); }
.bar-label-row span:last-child { font-size: 11px; font-weight: 600; }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 14px; }
.stat-box { background: var(--s1); border: 0.5px solid var(--border); border-radius: var(--r); padding: 10px 8px; text-align: center; }
.stat-abbr { font-size: 9px; font-weight: 700; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; margin-bottom: 3px; }
.stat-val { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
.stat-name { font-size: 9px; color: var(--text2); margin-top: 2px; }
.today-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
.today-box { background: var(--s2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 14px; }
.today-box .lbl { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.today-box .big { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; line-height: 1; }
.today-box .sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
.gold-val { color: var(--gold); }
.green-val { color: var(--green); }
.blue-val { color: var(--blue); }
.purple-val { color: var(--purple); }
.achievement-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.achievement-row::-webkit-scrollbar { display: none; }
.ach-chip { background: var(--s3); border: 0.5px solid var(--border2); border-radius: var(--r); padding: 10px 14px; white-space: nowrap; flex-shrink: 0; }
.ach-icon { font-size: 18px; display: block; text-align: center; }
.ach-name { font-size: 10px; color: var(--text2); margin-top: 3px; white-space: nowrap; }
.ach-locked { opacity: .35; }

/* ===================== HABITS ===================== */
.habit-tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-bottom: 16px; padding-bottom: 2px; }
.habit-tabs::-webkit-scrollbar { display: none; }
.htab { padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); white-space: nowrap; transition: all .15s; }
.htab.active { background: var(--gold); color: #000; border-color: transparent; }
.habit-card { background: var(--s2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: border-color .2s; position: relative; overflow: hidden; }
.habit-card:hover { border-color: var(--border2); }
.habit-card.negative { border-left: 3px solid var(--red); }
.habit-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.habit-info { flex: 1; min-width: 0; }
.habit-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.habit-meta { font-size: 11px; color: var(--text2); margin-top: 2px; display: flex; align-items: center; gap: 8px; }
.streak-fire { color: var(--gold); font-weight: 700; }
.habit-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.hbtn { width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; transition: transform .1s; }
.hbtn:active { transform: scale(.88); }
.hbtn-plus { background: var(--greenbg); color: var(--green); }
.hbtn-minus { background: var(--redbg); color: var(--red); }
.hbtn-neg { background: var(--redbg); color: var(--red); }
.rep-count { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; min-width: 28px; text-align: center; }

/* ===================== DAILIES ===================== */
.daily-progress-wrap { background: var(--s2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 14px 16px; margin-bottom: 16px; }
.dp-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.dp-label { font-size: 13px; font-weight: 500; }
.dp-count { font-size: 13px; color: var(--text2); }
.daily-item { background: var(--s2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 12px 14px; margin-bottom: 7px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all .15s; }
.daily-item.done { opacity: .55; }
.daily-item.done .daily-name { text-decoration: line-through; }
.daily-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; }
.daily-item.done .daily-check { background: var(--green); border-color: var(--green); }
.daily-check svg { display: none; }
.daily-item.done .daily-check svg { display: block; }
.daily-name { font-size: 13px; flex: 1; }
.daily-time { font-size: 11px; color: var(--text3); white-space: nowrap; }
.daily-xp { font-size: 10px; font-weight: 700; color: var(--gold); }

/* Weight entry */
.weight-card { background: linear-gradient(135deg, var(--purplebg), var(--bluebg)); border: 0.5px solid rgba(167,139,250,0.25); border-radius: var(--r); padding: 16px; margin-bottom: 10px; }
.weight-label { font-size: 11px; color: var(--purple); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
.weight-input-row { display: flex; align-items: center; gap: 10px; }
.weight-input { background: var(--s1); border: 0.5px solid var(--border2); color: var(--text); font-size: 24px; font-weight: 700; font-family: 'Syne', sans-serif; width: 120px; padding: 8px 12px; border-radius: 10px; outline: none; }
.weight-unit { font-size: 16px; color: var(--text2); }
.weight-save-btn { background: var(--purple); color: #fff; border: none; border-radius: 10px; padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
.weight-save-btn:hover { opacity: .85; }

/* ===================== MEALS ===================== */
.meal-toggle { display: flex; background: var(--s2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 4px; margin-bottom: 16px; }
.meal-toggle-btn { flex: 1; padding: 9px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text2); transition: all .2s; }
.meal-toggle-btn.active { background: var(--gold); color: #000; }
.macro-summary { background: var(--s2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 14px; }
.macro-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.macro-name { font-size: 12px; color: var(--text2); width: 80px; }
.macro-bar-wrap { flex: 1; margin: 0 10px; }
.macro-nums { font-size: 12px; font-weight: 600; min-width: 70px; text-align: right; }
.macro-total-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); }
.macro-box { text-align: center; }
.macro-box .mv { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
.macro-box .ml { font-size: 9px; color: var(--text2); font-weight: 600; margin-top: 1px; letter-spacing: .06em; }
.meal-card { background: var(--s2); border: 0.5px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 10px; }
.meal-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; }
.meal-done-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; }
.meal-card.done .meal-done-check { background: var(--green); border-color: var(--green); }
.meal-header-info { flex: 1; }
.meal-title { font-size: 14px; font-weight: 600; }
.meal-subtitle { font-size: 11px; color: var(--text2); margin-top: 2px; }
.meal-kcal { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--gold); }
.meal-body { padding: 0 16px 14px; border-top: 0.5px solid var(--border); }
.meal-item-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; border-bottom: 0.5px solid var(--border); }
.meal-item-row:last-child { border-bottom: none; }
.meal-item-name { color: var(--text2); }
.meal-item-qty { font-weight: 500; }

/* ===================== PROGRESS ===================== */
.chart-card { background: var(--s2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 12px; }
.chart-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--text2); text-transform: uppercase; letter-spacing: .07em; font-size: 10px; }
canvas { width: 100% !important; }
.hm-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 6px; }
.hm-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
.hm-day { font-size: 9px; color: var(--text3); text-align: center; }
.hm-cell { aspect-ratio: 1; border-radius: 3px; background: var(--s3); transition: opacity .2s; }
.milestone-list { margin-top: 4px; }
.ms-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.ms-row:last-child { border-bottom: none; }
.ms-icon { font-size: 20px; flex-shrink: 0; }
.ms-info { flex: 1; }
.ms-name { font-size: 13px; font-weight: 500; }
.ms-desc { font-size: 11px; color: var(--text2); margin-top: 1px; }
.ms-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; }
.ms-locked { opacity: .4; }

/* ===================== FLOATING XP ===================== */
.float-xp { position: fixed; pointer-events: none; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--gold); z-index: 9999; animation: floatUp .9s ease-out forwards; }
@keyframes floatUp { 0% { opacity:1; transform:translateY(0) scale(1); } 100% { opacity:0; transform:translateY(-60px) scale(1.2); } }
.float-stat { color: var(--green); font-size: 12px; }

/* LEVEL UP OVERLAY */
.levelup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9998; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; opacity: 0; pointer-events: none; transition: opacity .3s; }
.levelup-overlay.show { opacity: 1; pointer-events: all; }
.levelup-text { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; text-align: center; }
.levelup-sub { font-size: 15px; color: var(--text2); text-align: center; }
.levelup-new { font-family: 'Syne', sans-serif; font-size: 72px; font-weight: 800; color: var(--gold); line-height: 1; animation: pulse 1s ease infinite alternate; }
@keyframes pulse { from { transform: scale(.95); } to { transform: scale(1.05); } }
.levelup-close { margin-top: 12px; background: var(--gold); color: #000; border: none; padding: 12px 32px; border-radius: 30px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Syne', sans-serif; }
.glow-ring { width: 160px; height: 160px; border-radius: 50%; border: 3px solid var(--gold); box-shadow: 0 0 40px rgba(240,180,41,0.5), inset 0 0 40px rgba(240,180,41,0.1); display: flex; align-items: center; justify-content: center; }

/* TOAST */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--s3); border: 0.5px solid var(--border2); color: var(--text); font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 30px; z-index: 9997; transition: transform .3s cubic-bezier(.4,0,.2,1); white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* Perfect day banner */
.perfect-banner { background: linear-gradient(135deg, var(--goldbg), transparent); border: 0.5px solid rgba(240,180,41,0.3); border-radius: var(--r); padding: 12px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.perfect-banner span { font-size: 13px; font-weight: 600; color: var(--gold); }

/* Stat point modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9996; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal-sheet { background: var(--s2); border: 0.5px solid var(--border2); border-radius: var(--r2) var(--r2) 0 0; padding: 24px; width: 100%; max-width: 480px; }
.modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 18px; }
.stat-pick-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.stat-pick-btn { background: var(--s3); border: 0.5px solid var(--border2); border-radius: var(--r); padding: 16px; cursor: pointer; text-align: center; transition: all .2s; }
.stat-pick-btn:hover { border-color: var(--gold); background: var(--goldbg); }
.stat-pick-abbr { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.stat-pick-name { font-size: 12px; color: var(--text2); }
.stat-pick-desc { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* Avatar SVG */
.avatar-svg-wrap { width: 74px; height: 74px; border-radius: 50%; overflow: hidden; background: var(--s1); }
</style>
</head>
<body>

<!-- PAGES -->
<div class="page active" id="page-home"></div>
<div class="page" id="page-habits"></div>
<div class="page" id="page-daily"></div>
<div class="page" id="page-meals"></div>
<div class="page" id="page-progress"></div>

<!-- BOTTOM NAV -->
<nav>
  <button class="nav-btn active" onclick="goTo('home',this)" id="nav-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
    <span>Home</span>
  </button>
  <button class="nav-btn" onclick="goTo('habits',this)" id="nav-habits">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 6v6l4 2"/></svg>
    <span>Habits</span>
  </button>
  <button class="nav-btn" onclick="goTo('daily',this)" id="nav-daily">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    <span>Daily</span>
  </button>
  <button class="nav-btn" onclick="goTo('meals',this)" id="nav-meals">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>
    <span>Meals</span>
  </button>
  <button class="nav-btn" onclick="goTo('progress',this)" id="nav-progress">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span>Progress</span>
  </button>
</nav>

<!-- LEVEL UP OVERLAY -->
<div class="levelup-overlay" id="levelup-overlay">
  <div class="glow-ring"><div class="levelup-new" id="lu-num">2</div></div>
  <div class="levelup-text">⚡ LEVEL UP!</div>
  <div class="levelup-sub" id="lu-title">You are now an Apprentice</div>
  <button class="levelup-close" onclick="closeLevelUp()">Claim Reward</button>
</div>

<!-- STAT POINT MODAL -->
<div class="modal-overlay" id="stat-modal">
  <div class="modal-sheet">
    <div class="modal-title">Allocate Stat Point</div>
    <div class="modal-sub">You earned a free stat point. Choose where to invest it.</div>
    <div class="stat-pick-grid">
      <div class="stat-pick-btn" onclick="allocateStat('str')"><div class="stat-pick-abbr" style="color:var(--red)">STR</div><div class="stat-pick-name">Strength</div><div class="stat-pick-desc">Critical hits & gym performance</div></div>
      <div class="stat-pick-btn" onclick="allocateStat('con')"><div class="stat-pick-abbr" style="color:var(--green)">CON</div><div class="stat-pick-name">Constitution</div><div class="stat-pick-desc">HP, missed-task penalty reduction</div></div>
      <div class="stat-pick-btn" onclick="allocateStat('int')"><div class="stat-pick-abbr" style="color:var(--blue)">INT</div><div class="stat-pick-name">Intelligence</div><div class="stat-pick-desc">+2.5% XP per point of INT</div></div>
      <div class="stat-pick-btn" onclick="allocateStat('per')"><div class="stat-pick-abbr" style="color:var(--gold)">PER</div><div class="stat-pick-name">Perception</div><div class="stat-pick-desc">More gold & streak bonuses</div></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ==================== STATE ====================
const DEFAULT = {

// ==================== GAME ENGINE ====================
function xpNeeded(lv) { return Math.round((0.25*lv*lv + 10*lv + 139.75) / 10) * 10; }
function maxHP() { return 50 + S.player.stats.con * 2; }
function xpMult() { return 1 + (S.player.stats.int / 40); }
function goldMult() { return 1 + (S.player.stats.per / 100); }
function getTitle(lv) {
  if(lv<5) return 'Initiate'; if(lv<10) return 'Apprentice'; if(lv<20) return 'Warrior';
  if(lv<35) return 'Champion'; if(lv<50) return 'Veteran'; if(lv<70) return 'Master';
  if(lv<90) return 'Legend'; return 'Apex';
}
function addXP(base, el) {
  const earned = Math.round(base * xpMult());
  const gold = parseFloat((Math.random()*0.5 + 0.3 * goldMult()).toFixed(2));
  S.player.xp += earned;
  S.player.gold = parseFloat((S.player.gold + gold).toFixed(2));
  floatText(`+${earned} XP`, el, '#f0b429');
  floatText(`+${gold.toFixed(2)} GP`, el, '#00d97e', 24);
  const needed = xpNeeded(S.player.level);
  if(S.player.xp >= needed) {
    S.player.xp -= needed;
    S.player.level++;
    S.player.pendingStatPoints++;
    setTimeout(() => showLevelUp(), 400);
  }
  save(); renderAll();
}
function applyDamage(hp) {
  const dmgReduction = S.player.stats.con / 250;
  const actual = Math.round(hp * (1 - dmgReduction));
  S.player.hp = Math.max(0, S.player.hp - actual);
  save();
}

// ==================== CRON (daily reset) ====================
function todayKey() { return new Date().toISOString().slice(0,10); }
function runCron() {
  const today = todayKey();
  if(S.lastCron === today) return;
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yk = yesterday.toISOString().slice(0,10);
  if(S.lastCron && S.dailyHistory[yk]) {
    const DAILIES_DEFS = getDailiesDefs();
    let missed = 0;
    DAILIES_DEFS.forEach(d => { if(!S.dailyHistory[yk]?.[d.id]) missed++; });
    if(missed > 0) { applyDamage(missed * 5); showToast(`Missed ${missed} dailies yesterday — took damage 🩸`); }
    const allDone = DAILIES_DEFS.every(d => S.dailyHistory[yk]?.[d.id]);
    if(allDone) { S.player.hp = Math.min(maxHP(), S.player.hp + 10); showToast('Perfect Day yesterday! +10 HP recovered ⚡'); }
  }
  // streak update for habits
  S.habits.forEach(h => { if(!h.negative && h.reps === 0 && S.lastCron) h.streak = 0; });
  S.lastCron = today;
  save();
}

function floatText(text, el, color, offsetX=0) {
  const div = document.createElement('div');
  div.className = 'float-xp';
  div.style.color = color;
  div.textContent = text;
  const rect = el ? el.getBoundingClientRect() : {left: window.innerWidth/2, top: window.innerHeight/2};
  div.style.left = (rect.left + rect.width/2 + offsetX - 20) + 'px';
  div.style.top = (rect.top - 10) + 'px';
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 950);
}

function allocateStat(stat) {
  S.player.stats[stat]++;
  S.player.pendingStatPoints--;
  document.getElementById('stat-modal').classList.remove('show');
  showToast(`${stat.toUpperCase()} increased to ${S.player.stats[stat]}!`);
  save(); renderAll();
  if(S.player.pendingStatPoints > 0) setTimeout(() => document.getElementById('stat-modal').classList.add('show'), 500);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

}
function renderHabitCard(h) {
  const catColors = {physical:'#ff5f5f',mental:'#4facfe',nutrition:'#00d97e',grooming:'#f0b429',recovery:'#a78bfa'};
  const col = catColors[h.cat] || '#888';
  return `<div class="habit-card ${h.negative?'negative':''}" id="hcard-${h.id}">
    <div class="habit-icon" style="background:${col}18">${h.icon}</div>
    <div class="habit-info">
      <div class="habit-name">${h.name}</div>
      <div class="habit-meta">
        <span class="badge" style="background:${col}18;color:${col}">${h.cat}</span>
        ${!h.negative ? `<span class="streak-fire">${h.streak > 0 ? '🔥' + h.streak + 'd' : ''}</span>
        <span style="font-size:10px;color:var(--gold)">+${h.xpBase} XP</span>` : `<span style="font-size:10px;color:var(--red)">-${Math.round(5*xpMult())} HP</span>`}
      </div>
    </div>
    <div class="habit-controls">
      ${h.negative
        ? `<div class="rep-count" style="color:var(--red)">${h.reps}</div>
           <button class="hbtn hbtn-neg" onclick="negHabit('${h.id}',event)">−</button>`
        : `<button class="hbtn hbtn-minus" onclick="decHabit('${h.id}',event)">−</button>
           <div class="rep-count">${h.reps}</div>
           <button class="hbtn hbtn-plus" onclick="incHabit('${h.id}',event)">+</button>`}
    </div>
  </div>`;
}
function setHabCat(c) { activeHabCat=c; renderHabits(); }
function incHabit(id, e) {
  const h = S.habits.find(x=>x.id===id);
  h.reps++; h.streak++;
  addXP(h.xpBase, e.target);
  checkAchievements();
}
function decHabit(id, e) {
  const h = S.habits.find(x=>x.id===id);
  if(h.reps > 0) { h.reps--; if(h.streak>0)h.streak--; save(); renderHabits(); }
}
function negHabit(id, e) {
  const h = S.habits.find(x=>x.id===id);
  h.reps++;
  applyDamage(5);
  floatText('-5 HP', e.target, '#ff5f5f');
  showToast(`Logged: ${h.name} — stay on track 💪`);
  save(); renderHabits(); renderHome();
}

// ==================== RENDER DAILY ====================
function renderDaily() {
  const today = todayKey();
  const dailies = getDailiesDefs();
  const done = dailies.filter(d => S.dailyHistory[today]?.[d.id]).length;
  const pct = Math.round(done/dailies.length*100);
  const blocks = ['Morning','Office','Evening'];
  const todayWeight = S.weightHistory[today] || '';
  const allDone = done === dailies.length;
  let html = `
    <h1 class="pg-title">Daily</h1>
    <p class="pg-sub">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</p>
    ${allDone ? `<div class="perfect-banner"><span style="font-size:20px">👑</span><div><span>Perfect Day!</span><div style="font-size:11px;color:var(--text2);margin-top:2px">All dailies complete — +10 HP tomorrow morning</div></div></div>` : ''}
    <div class="daily-progress-wrap">
      <div class="dp-row"><span class="dp-label">Today's progress</span><span class="dp-count">${done} / ${dailies.length}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${pct===100?'var(--gold)':'var(--green)'}"></div></div>
    </div>
    <div class="weight-card">
      <div class="weight-label">⚖️ Log today's weight</div>
      <div class="weight-input-row">
        <input class="weight-input" type="number" id="weight-input" placeholder="98.0" value="${todayWeight}" step="0.1" min="50" max="200">
        <span class="weight-unit">kg</span>
        <button class="weight-save-btn" onclick="saveWeight()">Save</button>
      </div>
      ${todayWeight ? `<div style="font-size:11px;color:var(--purple);margin-top:8px;font-weight:500">Logged: ${todayWeight} kg — target 83–87 kg for visible abs 🎯</div>` : ''}
    </div>`;
  blocks.forEach(block => {
    const items = dailies.filter(d => d.block === block && !d.special);
    if(!items.length) return;
    html += `<div class="section-label">${block} block</div>`;
    items.forEach(d => {
      const isDone = S.dailyHistory[today]?.[d.id];
      const statColors = {str:'var(--red)',con:'var(--green)',int:'var(--blue)',per:'var(--gold)'};
      html += `<div class="daily-item ${isDone?'done':''}" onclick="toggleDaily('${d.id}',this)">
        <div class="daily-check"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="daily-name">${d.name}</div>
        <span style="font-size:10px;color:${statColors[d.stat]};font-weight:700;margin-right:4px">${d.stat.toUpperCase()}</span>
        <div class="daily-time">${d.time}</div>
      </div>`;
    });
  });
  html += '</div>';
  document.getElementById('page-daily').innerHTML = html;
}
function toggleDaily(id, el) {
  const today = todayKey();
  if(!S.dailyHistory[today]) S.dailyHistory[today] = {};
  const wasDone = S.dailyHistory[today][id];
  S.dailyHistory[today][id] = !wasDone;
  if(!wasDone) {
    const d = getDailiesDefs().find(x=>x.id===id);
    addXP(d.xp, el);
    checkAchievements();
  }
  save(); renderDaily();
}
function saveWeight() {
  const val = parseFloat(document.getElementById('weight-input').value);
  if(isNaN(val) || val < 30 || val > 250) { showToast('Please enter a valid weight (30–250 kg)'); return; }
  S.weightHistory[todayKey()] = val;
  const diff = val - 98;
  showToast(`Weight saved: ${val} kg ${diff < 0 ? '(down ' + Math.abs(diff).toFixed(1) + ' kg from start!) 🎉' : ''}`);
  if(!S.dailyHistory[todayKey()]) S.dailyHistory[todayKey()] = {};
  if(!S.dailyHistory[todayKey()]['weigh']) {
    S.dailyHistory[todayKey()]['weigh'] = true;
    addXP(8, document.getElementById('weight-input'));
  }
  save(); renderDaily();
}

// ==================== RENDER MEALS ====================
let isVeg = S.mealHistory[todayKey()]?.isVeg || false;
function renderMeals() {
  const today = todayKey();
  const meals = getMealsDefs(isVeg);
  const mealState = S.mealHistory[today] || {};
  const doneMeals = meals.filter(m => mealState[m.id]);
  let totalP=0, totalC=0, totalF=0, totalKcal=0;
  doneMeals.forEach(m => { totalP+=m.p; totalC+=m.c; totalF+=m.f; totalKcal+=m.kcal; });
  const targetP=195, targetC=220, targetF=65, targetKcal=2400;
  document.getElementById('page-meals').innerHTML = `
    <h1 class="pg-title">Meal Tracker</h1>
    <p class="pg-sub">Track your nutrition. Protein first, always.</p>
    <div class="meal-toggle">
      <div class="meal-toggle-btn ${!isVeg?'active':''}" onclick="setVeg(false)">Non-Veg Day</div>
      <div class="meal-toggle-btn ${isVeg?'active':''}" onclick="setVeg(true)">Veg Day</div>
    </div>
    <div class="macro-summary">
      <div class="macro-row">
        <span class="macro-name">Protein</span>
        <div class="macro-bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,(totalP/targetP*100)).toFixed(0)}%;background:var(--green)"></div></div></div>
        <span class="macro-nums" style="color:var(--green)">${totalP} / ${targetP}g</span>
      </div>
      <div class="macro-row">
        <span class="macro-name">Carbs</span>
        <div class="macro-bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,(totalC/targetC*100)).toFixed(0)}%;background:var(--blue)"></div></div></div>
        <span class="macro-nums" style="color:var(--blue)">${totalC} / ${targetC}g</span>
      </div>
      <div class="macro-row">
        <span class="macro-name">Fat</span>
        <div class="macro-bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,(totalF/targetF*100)).toFixed(0)}%;background:var(--gold)"></div></div></div>
        <span class="macro-nums" style="color:var(--gold)">${totalF} / ${targetF}g</span>
      </div>
      <div class="macro-total-row">
        <div class="macro-box"><div class="mv" style="color:var(--green)">${totalKcal}</div><div class="ml">KCAL</div></div>
        <div class="macro-box"><div class="mv" style="color:var(--green)">${totalP}g</div><div class="ml">PROTEIN</div></div>
        <div class="macro-box"><div class="mv" style="color:var(--blue)">${totalC}g</div><div class="ml">CARBS</div></div>
        <div class="macro-box"><div class="mv" style="color:var(--gold)">${totalF}g</div><div class="ml">FAT</div></div>
      </div>
    </div>
    ${meals.map(m => {
      const done = mealState[m.id];
      return `<div class="meal-card ${done?'done':''}">
        <div class="meal-header" onclick="toggleMeal('${m.id}',this)">
          <div class="meal-done-check"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="meal-header-info">
            <div class="meal-title">${m.title}</div>
            <div class="meal-subtitle">${m.subtitle}</div>
          </div>
          <div>
            <div class="meal-kcal">${m.kcal}</div>
            <div style="font-size:9px;color:var(--text3);text-align:right">kcal</div>
          </div>
        </div>
        <div class="meal-body">
          ${m.items.map(i=>`<div class="meal-item-row"><span class="meal-item-name">${i.n}</span><span class="meal-item-qty">${i.q}</span></div>`).join('')}
          <div style="display:flex;gap:10px;margin-top:8px">
            <span class="badge" style="background:var(--greenbg);color:var(--green)">P: ${m.p}g</span>
            <span class="badge" style="background:var(--bluebg);color:var(--blue)">C: ${m.c}g</span>
            <span class="badge" style="background:var(--goldbg);color:var(--gold)">F: ${m.f}g</span>
          </div>
        </div>
      </div>`;
    }).join('')}
    <div style="background:var(--s2);border:0.5px solid var(--border);border-radius:var(--r);padding:14px;margin-top:4px;font-size:12px;color:var(--text2)">
      <strong style="color:var(--text);display:block;margin-bottom:4px">Target: 2,400 kcal · 195g protein</strong>
      ${totalP >= 150 ? '✅ Great protein intake today' : '⚠️ Protein still below target — add a whey shake'}
      <br>${totalKcal < 1800 ? '⚠️ Under-eating — you need more fuel for recomp' : totalKcal > 2600 ? '⚠️ Slightly over target' : '✅ Calories on track'}
    </div>`;
}
function setVeg(v) {
  isVeg = v;
  const today = todayKey();
  if(!S.mealHistory[today]) S.mealHistory[today] = {};
  S.mealHistory[today].isVeg = v;
  save(); renderMeals();
}
function toggleMeal(id, el) {
  const today = todayKey();
  if(!S.mealHistory[today]) S.mealHistory[today] = {};
  const was = S.mealHistory[today][id];
  S.mealHistory[today][id] = !was;
  if(!was) { addXP(10, el); showToast('Meal logged! +10 XP'); }
  save(); renderMeals();
}

// ==================== RENDER PROGRESS ====================
function renderProgress() {
  document.getElementById('page-progress').innerHTML = `
    <h1 class="pg-title">Progress</h1>
    <p class="pg-sub">Data doesn't lie. Every data point is a vote.</p>
    <div class="chart-card"><div class="chart-title">Weight trend (kg)</div><canvas id="wt-chart" height="160"></canvas></div>
    <div class="chart-card"><div class="chart-title">Daily completion % — last 14 days</div><canvas id="comp-chart" height="140"></canvas></div>
    <div class="chart-card">
      <div class="chart-title">28-day habit heatmap</div>
      <div class="hm-days">${['S','M','T','W','T','F','S'].map(d=>`<div class="hm-day">${d}</div>`).join('')}</div>
      <div class="hm-grid" id="hm-grid"></div>
    </div>
    <div class="chart-card"><div class="chart-title">Stat distribution</div><canvas id="radar-chart" height="220"></canvas></div>
    <div class="section-label">Level milestones</div>
    <div class="card-sm milestone-list">
      ${[
        {lv:1,icon:'🌱',name:'Initiate',desc:'Begin the journey'},
        {lv:5,icon:'⚡',name:'Level 5',desc:'First milestone — habits forming'},
        {lv:10,icon:'⚔️',name:'Class unlocked',desc:'Warrior class activated at level 10'},
        {lv:20,icon:'🔥',name:'Warrior',desc:'Serious dedication proven'},
        {lv:35,icon:'🏅',name:'Champion',desc:'Top 20% discipline'},
        {lv:50,icon:'💎',name:'Veteran',desc:'Habits are now your identity'},
        {lv:70,icon:'👑',name:'Master',desc:'Extraordinary commitment'},
        {lv:100,icon:'🌟',name:'Apex',desc:'The highest tier'},
      ].map(m=>{
        const unlocked = S.player.level >= m.lv;
        return `<div class="ms-row ${unlocked?'':'ms-locked'}">
          <div class="ms-icon">${m.icon}</div>
          <div class="ms-info"><div class="ms-name">${m.name}</div><div class="ms-desc">${m.desc}</div></div>
          <div class="ms-badge ${unlocked?'':'ms-locked'}" style="background:${unlocked?'var(--goldbg)':'var(--s3)'};color:${unlocked?'var(--gold)':'var(--text3)'}">LV ${m.lv}</div>
        </div>`;
      }).join('')}
    </div>`;
  setTimeout(() => { buildCharts(); buildHeatmap(); }, 80);
}

function buildCharts() {
  const dates14 = getLast14Days();
  // Weight chart
  const wtLabels = [], wtData = [];
  getLast30Days().forEach(d => {
    const w = S.weightHistory[d];
    if(w !== undefined) { wtLabels.push(d.slice(5)); wtData.push(w); }
  });
  if(wtLabels.length < 2) { wtLabels.push('Start'); wtData.push(98); }
  const wtCtx = document.getElementById('wt-chart');
  if(wtCtx) new Chart(wtCtx, { type:'line', data:{ labels:wtLabels, datasets:[{label:'Weight (kg)',data:wtData,borderColor:'#a78bfa',backgroundColor:'rgba(167,139,250,0.1)',tension:.4,pointBackgroundColor:'#a78bfa',fill:true}]}, options:{responsive:true,scales:{y:{min:Math.max(60,Math.min(...wtData)-2),grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#8888aa',font:{size:10}}},x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#8888aa',font:{size:10}}}},plugins:{legend:{display:false}}}});
  // Completion chart
  const compLabels = [], compData = [];
  dates14.forEach(d => {
    const dailies = getDailiesDefs();
    const done = dailies.filter(x => S.dailyHistory[d]?.[x.id]).length;
    compLabels.push(d.slice(5));
    compData.push(dailies.length ? Math.round(done/dailies.length*100) : 0);
  });
  const compCtx = document.getElementById('comp-chart');
  if(compCtx) new Chart(compCtx, {type:'bar',data:{labels:compLabels,datasets:[{label:'%',data:compData,backgroundColor:compData.map(v=>v>=80?'#00d97e':v>=50?'#4facfe':'#ff5f5f'),borderRadius:6}]},options:{responsive:true,scales:{y:{min:0,max:100,grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#8888aa',font:{size:10},callback:v=>v+'%'}},x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#8888aa',font:{size:9}}}},plugins:{legend:{display:false}}}});
  // Radar
  const radarCtx = document.getElementById('radar-chart');
  const pl = S.player;
  if(radarCtx) new Chart(radarCtx,{type:'radar',data:{labels:['Strength','Constitution','Intelligence','Perception'],datasets:[{label:'Stats',data:[pl.stats.str,pl.stats.con,pl.stats.int,pl.stats.per],borderColor:'#f0b429',backgroundColor:'rgba(240,180,41,0.15)',pointBackgroundColor:'#f0b429',pointRadius:4}]},options:{responsive:true,scales:{r:{min:0,grid:{color:'rgba(255,255,255,0.08)'},angleLines:{color:'rgba(255,255,255,0.08)'},ticks:{color:'#8888aa',backdropColor:'transparent',font:{size:9}},pointLabels:{color:'#8888aa',font:{size:11}}}},plugins:{legend:{display:false}}}});
}
function buildHeatmap() {
  const dates28 = getLast28Days();
  const grid = document.getElementById('hm-grid');
  if(!grid) return;
  const first = new Date(dates28[0]);
  let html = '';
  for(let i=0;i<first.getDay();i++) html += `<div class="hm-cell" style="opacity:0"></div>`;
  dates28.forEach(d => {
    const dailies = getDailiesDefs();
    const done = dailies.filter(x => S.dailyHistory[d]?.[x.id]).length;
    const pct = dailies.length ? done/dailies.length : 0;
    const op = pct === 0 ? 0.08 : pct < 0.4 ? 0.2 : pct < 0.7 ? 0.5 : pct < 0.9 ? 0.75 : 1;
    html += `<div class="hm-cell" style="background:rgba(79,172,254,${op})" title="${d}: ${Math.round(pct*100)}%"></div>`;
  });
  grid.innerHTML = html;
}
function getLast14Days() { return Array.from({length:14},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-13+i); return d.toISOString().slice(0,10); }); }
function getLast28Days() { return Array.from({length:28},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-27+i); return d.toISOString().slice(0,10); }); }
function getLast30Days() { return Array.from({length:30},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-29+i); return d.toISOString().slice(0,10); }); }

// ==================== INIT ====================
runCron();
renderHome();
</script>
</body>
</html>
